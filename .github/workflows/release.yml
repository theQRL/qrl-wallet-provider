name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ===========================================================================
  # CI: Lint, Test, Build (reusable workflow)
  # ===========================================================================
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ===========================================================================
  # Release: Semantic Release + npm Publish
  # ===========================================================================
  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'theQRL/qrl-wallet-provider'
    environment: npm-publish
    permissions:
      contents: write # push release commits and tags via semantic-release
      issues: write # semantic-release opens issues for release failures
      pull-requests: write # semantic-release comments on released PRs
      id-token: write # npm provenance signing for `npm publish`
    outputs:
      released: ${{ steps.check-release.outputs.released }}
      version: ${{ steps.check-release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        run: npm run build

      - name: Get current version
        id: version-before
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.BYPASS_SSH_KEY }}

      - name: Configure Git for SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"

      - name: Semantic Release (version & changelog)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/exec@6 \
            -p @semantic-release/git@10 \
            -p conventional-changelog-conventionalcommits@8 \
            semantic-release --repository-url "git@github.com:${GITHUB_REPOSITORY}.git"

      - name: Check if release happened
        id: check-release
        env:
          OLD_VERSION: ${{ steps.version-before.outputs.version }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Old version: $OLD_VERSION, New version: $NEW_VERSION"
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.check-release.outputs.released == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  # ===========================================================================
  # Supply Chain: SBOM, Checksums, GitHub Attestations
  # ===========================================================================
  supply-chain-artifacts:
    name: Supply Chain Artifacts
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write # upload SBOMs and checksums to the GitHub Release
      id-token: write # mint OIDC token for build provenance signing
      attestations: write # create build-provenance attestations
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate checksums
        run: |
          mkdir -p artifacts
          sha256sum package.json package-lock.json > artifacts/checksums-sha256.txt
          sha512sum package.json package-lock.json > artifacts/checksums-sha512.txt
          find dist -type f | sort | xargs sha256sum >> artifacts/dist-checksums-sha256.txt

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: artifacts/sbom-spdx.json
          artifact-name: sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: artifacts/sbom-cyclonedx.json
          artifact-name: sbom-cyclonedx.json

      - name: Attest checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/checksums-sha256.txt
            artifacts/checksums-sha512.txt
            artifacts/dist-checksums-sha256.txt

      - name: Attest SBOM (SPDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: artifacts/sbom-spdx.json
          sbom-path: artifacts/sbom-spdx.json

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: artifacts/sbom-cyclonedx.json
          sbom-path: artifacts/sbom-cyclonedx.json

      - name: Attest package files
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            package.json
            package-lock.json

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh release upload "v${RELEASE_VERSION}" \
            artifacts/checksums-sha256.txt \
            artifacts/checksums-sha512.txt \
            artifacts/dist-checksums-sha256.txt \
            artifacts/sbom-spdx.json \
            artifacts/sbom-cyclonedx.json \
            --clobber

  # ===========================================================================
  # SLSA Level 3 Provenance
  # ===========================================================================
  slsa-subjects:
    name: Compute SLSA Subjects
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        run: npm run build

      - name: Pack npm tarball
        run: |
          mkdir -p tarballs
          npm pack --pack-destination tarballs
          ls -la tarballs/

      - name: Generate subject hashes
        id: hash
        run: |
          set -euo pipefail
          cd tarballs
          echo "hashes=$(sha256sum ./*.tgz | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball
          path: tarballs/*.tgz
          retention-days: 5

  slsa-provenance:
    name: SLSA Provenance
    needs: [release, slsa-subjects]
    if: needs.release.outputs.released == 'true'
    permissions:
      actions: read # SLSA generator inspects the run's workflow definition
      id-token: write # SLSA provenance is signed via OIDC
      contents: write # upload provenance to the GitHub Release
    # NOTE: SLSA generator must be referenced by tag, not SHA — the reusable
    # workflow inspects its own caller-ref to embed the version into the
    # provenance and aborts when called by digest.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.slsa-subjects.outputs.hashes }}
      upload-assets: false
      provenance-name: provenance.intoto.jsonl

  slsa-upload:
    name: Upload SLSA Provenance
    runs-on: ubuntu-latest
    needs: [release, slsa-provenance]
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write # attach SLSA provenance asset to the GitHub Release
    steps:
      - name: Download provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provenance.intoto.jsonl

      - name: Download npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-tarball
          path: tarball

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh release upload "v${RELEASE_VERSION}" \
            provenance.intoto.jsonl \
            tarball/*.tgz \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
